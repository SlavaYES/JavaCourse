<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>REST</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
</head>
<body>
    <script>
        $(document).ready(function () {
            $.get('http://localhost:8081/info', function (data) {
                console.log(data);

                $(".user").html(data[0].name + data[1].name);
            }).fail(function (data) {
                console.log(data);
                $(".user").html("NO");
            });
        })
    </script>
    <div class="user"></div>
</body>
</html>
